<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESKARD WEB | ALL-IN-ONE SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        /* Configuración Global */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050505; color: #fff;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 242, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 80, 0.15) 0%, transparent 40%),
                linear-gradient(0deg, rgba(0, 255, 242, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 242, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 35px 35px, 35px 35px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Scanline Efecto Cyber */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 242, 0.3); box-shadow: 0 0 15px #00fff2;
            animation: scanline 6s linear infinite; pointer-events: none; z-index: 1000;
        }
        @keyframes scanline { 0% { top: -10%; } 100% { top: 110%; } }

        /* Botón Convertirse en Vendedor (Top Right) */
        .seller-btn-top {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(83, 252, 24, 0.1); border: 2px solid #53fc18;
            color: #53fc18; padding: 12px 25px; border-radius: 12px;
            font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(83, 252, 24, 0.3);
        }
        .seller-btn-top:hover { 
            background: #53fc18; color: #000; box-shadow: 0 0 30px #53fc18;
            transform: scale(1.08) rotate(-1deg);
        }

        /* Estructura de Páginas */
        .page-content {
            display: none; flex-direction: column; justify-content: center;
            align-items: center; width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; z-index: 10; text-align: center; padding: 20px;
            box-sizing: border-box; animation: slideIn 0.5s ease-out;
        }
        .active { display: flex; }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 9vw, 4rem);
            font-weight: 900; text-transform: uppercase; letter-spacing: 10px;
            margin: 0 0 30px 0; color: #fff;
            text-shadow: 5px 5px 0px #ff0050, -5px -5px 0px #00fff2;
        }

        /* Tienda System (Tabs) */
        .tabs-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(244, 208, 63, 0.5);
            color: #f4d03f; padding: 10px 20px; border-radius: 10px; cursor: pointer;
            font-family: 'Orbitron'; transition: 0.3s; font-size: 0.8rem;
        }
        .tab-btn.active { background: #f4d03f; color: #000; box-shadow: 0 0 15px #f4d03f; }

        .store-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; width: 100%; max-width: 1000px; max-height: 50vh; overflow-y: auto;
            padding: 10px; scrollbar-width: thin; scrollbar-color: #f4d03f transparent;
        }

        /* Producto Card */
        .product-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 20px; position: relative; text-align: left;
            backdrop-filter: blur(15px); transition: 0.3s;
        }
        .product-card:hover { border-color: #f4d03f; transform: translateY(-5px); }

        .status-badge {
            position: absolute; top: 15px; right: 15px; padding: 5px 10px;
            font-size: 0.6rem; font-weight: bold; border-radius: 5px;
        }
        .online { background: #53fc18; color: #000; }

        .price { color: #f4d03f; font-size: 1.5rem; font-weight: 900; margin: 10px 0; }
        .btn-buy {
            width: 100%; background: #f4d03f; color: #000; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;
            font-family: 'Orbitron'; text-transform: uppercase;
        }

        /* Formulario Sign In */
        .form-container {
            background: rgba(0, 0, 0, 0.6); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(83, 252, 24, 0.3); width: 100%; max-width: 450px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .form-container input {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #333;
            padding: 15px; border-radius: 12px; color: #fff; font-size: 1rem;
        }
        .form-container input:focus { border-color: #53fc18; outline: none; }

        /* Botones Navegación */
        .nav-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; }
        .nav-btn {
            padding: 22px; font-size: 1.3rem; font-weight: 900; font-family: 'Orbitron';
            text-transform: uppercase; letter-spacing: 3px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            color: #fff; cursor: pointer; transition: 0.4s;
        }
        .nav-btn:hover { border-color: #00fff2; background: rgba(0, 255, 242, 0.1); box-shadow: 0 0 25px rgba(0, 255, 242, 0.4); }

        .back-btn { color: #ff0050; font-weight: bold; margin-top: 25px; cursor: pointer; letter-spacing: 2px; }

        .footer { position: fixed; bottom: 20px; font-size: 0.6rem; color: rgba(255,255,255,0.2); letter-spacing: 5px; }
    </style>
</head>
<body>

    <button class="seller-btn-top" onclick="showPage('signin')">Convertirse en Vendedor</button>

    <!-- INICIO (HOME) -->
    <section id="main" class="page-content active">
        <div style="color: #00fff2; letter-spacing: 10px; font-size: 0.8rem; font-family: 'Orbitron';">CORE V10.0</div>
        <h1>VESKARD</h1>
        <div class="nav-container">
            <button class="nav-btn" onclick="showPage('tienda')">Marketplace</button>
            <button class="nav-btn" onclick="showPage('videos')">Videos</button>
            <button class="nav-btn" onclick="showPage('lives')">Lives</button>
        </div>
        <div class="footer">KINGI GATINI STUDIOS // BY DYLAN</div>
    </section>

    <!-- TIENDA (SISTEMA COMPLETO) -->
    <section id="tienda" class="page-content">
        <h1>Tienda</h1>
        <div class="tabs-container">
            <button class="tab-btn active" onclick="filter('all')">Todo</button>
            <button class="tab-btn" onclick="filter('items')">Items</button>
            <button class="tab-btn" onclick="filter('cash')">Gemas/Cash</button>
        </div>
        <div class="store-grid">
            <div style="grid-column: 1/-1; border: 2px dashed #444; padding: 50px; border-radius: 20px; color: #888;">
                <h2 style="font-family: 'Orbitron';">Marketplace Vacío</h2>
                <p>Aún no hay productos disponibles. ¡Únete como vendedor arriba!</p>
            </div>
        </div>
        <div class="back-btn" onclick="showPage('main')">VOLVER AL INICIO</div>
    </section>

    <!-- SIGN IN (REGISTRO VENDEDOR) -->
    <section id="signin" class="page-content">
        <h1 style="color: #53fc18; text-shadow: 0 0 20px #53fc18;">REGISTRO</h1>
        <form class="form-container" onsubmit="registerSeller(event)">
            <input type="text" id="nom" placeholder="Nombre completo" required>
            <input type="text" id="nick" placeholder="Nickname / Usuario" required>
            <input type="email" id="mail" placeholder="Correo Electrónico" required>
            <input type="tel" id="tel" placeholder="Teléfono" required>
            <button type="submit" class="btn-continue">Convertirse en Vendedor</button>
        </form>
        <div class="back-btn" onclick="showPage('main')">CANCELAR</div>
    </section>

    <!-- VIDEOS & LIVES -->
    <section id="videos" class="page-content">
        <h1>Galería</h1>
        <div class="nav-container">
            <a href="https://www.tiktok.com/@verskard" style="text-decoration:none" target="_blank"><button class="nav-btn" style="border-color:#ff0050; color:#ff0050; width:100%">TikTok</button></a>
            <a href="https://www.youtube.com/@King_Os1207" style="text-decoration:none" target="_blank"><button class="nav-btn" style="border-color:#ff0000; color:#ff0000; width:100%">YouTube</button></a>
        </div>
        <div class="back-btn" onclick="showPage('main')">VOLVER</div>
    </section>

    <section id="lives" class="page-content">
        <h1>Transmisiones</h1>
        <div class="nav-container">
            <a href="https://www.twitch.tv/king_os12857" style="text-decoration:none" target="_blank"><button class="nav-btn" style="border-color:#a970ff; color:#a970ff; width:100%">Twitch</button></a>
            <a href="https://kick.com/king-os1234" style="text-decoration:none" target="_blank"><button class="nav-btn" style="border-color:#53fc18; color:#53fc18; width:100%">Kick</button></a>
        </div>
        <div class="back-btn" onclick="showPage('main')">VOLVER</div>
    </section>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function registerSeller(e) {
            e.preventDefault();
            const nombre = document.getElementById('nom').value;
            const correo = document.getElementById('mail').value;

            alert(`¡BIENVENIDO A KINGI GATINI STUDIOS!\n\nSe ha enviado un correo a: ${correo}\n\n"Bienvenido ${nombre}, te convertiste en vendedor"`);
            
            showPage('main');
            e.target.reset();
        }

        function filter(cat) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
